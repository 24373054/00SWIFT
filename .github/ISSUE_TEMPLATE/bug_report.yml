name: Bug report
description: Report a reproducible defect without sensitive information
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report vulnerabilities or include credentials/payment data here. Follow SECURITY.md instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options: [sandbox, pilot, live, tests, container]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal sanitized steps, request shape, and logs with secrets removed.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
