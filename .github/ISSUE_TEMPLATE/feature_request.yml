name: Feature request
description: Propose a focused improvement to the sandbox
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What integration, research, or operational problem needs to be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe contracts, invariants, and failure behavior.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and compatibility impact
      description: Authentication, authorization, ledger, schema, migration, or upstream effects.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
