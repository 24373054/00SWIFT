name: NextGen XML security repair

on:
  push:
    branches: [feat/v3-batch1-standards-runtime]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/v3-batch1-standards-runtime
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Replace unsafe parser and remove repair workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("backend/nextgen/standards.py")
          text = path.read_text()
          text = text.replace(
              "from xml.etree import ElementTree\n",
              "from defusedxml import ElementTree as SafeElementTree\nfrom lxml import etree as XmlBuilder\n",
          )
          text = text.replace(
              "root = ElementTree.fromstring(xml_text)",
              "root = SafeElementTree.fromstring(xml_text)",
          )
          text = text.replace("ElementTree.Element(", "XmlBuilder.Element(")
          text = text.replace("ElementTree.SubElement(", "XmlBuilder.SubElement(")
          text = text.replace("ElementTree.tostring(", "XmlBuilder.tostring(")
          path.write_text(text)
          PY
          rm .github/workflows/nextgen-xml-security-fix.yml
      - name: Validate and commit
        run: |
          python -m pip install -r backend/requirements-dev.txt
          ruff check --fix backend
          ruff format backend
          bandit -q -r backend -c pyproject.toml
          pytest backend/tests/test_nextgen_standards.py backend/tests/test_nextgen_api.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "security: use hardened XML parser"
          git push origin HEAD:feat/v3-batch1-standards-runtime
