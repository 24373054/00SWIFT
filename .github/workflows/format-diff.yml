name: Ruff format diagnosis

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install exact Ruff
        run: python -m pip install ruff==0.15.22
      - name: Capture formatting diff
        shell: bash
        run: |
          set -o pipefail
          ruff --version | tee format-diff.log
          ruff format --check --diff backend 2>&1 | tee -a format-diff.log
      - name: Upload diagnosis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-format-diff
          path: format-diff.log
          if-no-files-found: error
          retention-days: 1
