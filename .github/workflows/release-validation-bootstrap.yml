name: Release validation bootstrap

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-validation-bootstrap.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch-current-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
      - name: Dispatch validation for the current published version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python -c 'from pathlib import Path; import re; print(re.search(r"version = \"([^\"]+)\"", Path("pyproject.toml").read_text()).group(1))')"
          TAG="v${VERSION}"
          gh release view "$TAG" --json isDraft,isPrerelease \
            --jq 'select(.isDraft == false and .isPrerelease == false)' >/dev/null
          gh workflow run release.yml --ref main -f tag="$TAG"
