name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip check
      - name: Ruff lint
        run: ruff check backend
      - name: Ruff format
        run: ruff format --check backend
      - name: Compile Python
        run: python -m compileall -q backend
      - name: Parse frontend JavaScript
        run: node --check frontend/app.js
      - name: Bandit
        run: bandit -q -r backend -c pyproject.toml

  tests:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip check
      - name: Run tests with coverage gate
        run: >-
          pytest
          --cov=backend
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=68
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  release-integrity:
    name: Release candidate or published release integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify release request or published assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python -c 'from pathlib import Path; import re; print(re.search(r"version = \"([^\"]+)\"", Path("pyproject.toml").read_text()).group(1))')"
          TAG="v${VERSION}"
          if ! gh release view "$TAG" --json tagName,isDraft,isPrerelease,targetCommitish,assets > /tmp/release.json 2>/dev/null; then
            test -f ".release/${TAG}"
            test -f "docs/releases/${TAG}.md"
            grep -Fq "## [${VERSION}]" CHANGELOG.md
            if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag exists without a readable published Release: ${TAG}" >&2
              exit 1
            fi
            echo "Validated pending release request ${TAG}; publication remains gated by main CI and CodeQL."
            exit 0
          fi
          jq -e --arg tag "$TAG" '
            .tagName == $tag and
            .isDraft == false and
            .isPrerelease == false and
            ([.assets[].name] | sort) ==
              (["00SWIFT-'"$VERSION"'-dependencies.txt", "00SWIFT-'"$VERSION"'.tar.gz", "SHA256SUMS"] | sort)
          ' /tmp/release.json
          mkdir -p /tmp/release-assets
          gh release download "$TAG" --dir /tmp/release-assets --clobber
          test -s "/tmp/release-assets/00SWIFT-${VERSION}.tar.gz"
          test -s "/tmp/release-assets/00SWIFT-${VERSION}-dependencies.txt"
          test -s /tmp/release-assets/SHA256SUMS
          sed 's#  dist/#  #' /tmp/release-assets/SHA256SUMS > /tmp/SHA256SUMS.normalized
          (cd /tmp/release-assets && sha256sum --check /tmp/SHA256SUMS.normalized)
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          TAG_VERSION="$(git show "${TAG}:pyproject.toml" | python -c 'import re, sys; print(re.search(r"version = \"([^\"]+)\"", sys.stdin.read()).group(1))')"
          test "$TAG_VERSION" = "$VERSION"

  docker:
    name: Container build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, tests]
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build --tag 00swift:ci .
      - name: Start container
        run: |
          docker run --detach --rm --name 00swift-ci \
            --publish 8765:8765 \
            --env SWIFT_ENV=sandbox \
            --env DB_URL=sqlite:////tmp/swift_dev.db \
            00swift:ci
      - name: Wait for readiness
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8765/ready >/dev/null; then
              curl --fail --silent http://127.0.0.1:8765/health
              exit 0
            fi
            sleep 1
          done
          docker logs 00swift-ci
          exit 1
      - name: Container logs
        if: always()
        run: docker logs 00swift-ci || true
