name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip check
      - name: Ruff lint
        run: ruff check backend
      - name: Ruff format
        run: ruff format --check backend
      - name: Compile Python
        run: python -m compileall -q backend
      - name: Parse frontend JavaScript
        run: node --check frontend/app.js
      - name: Bandit
        run: bandit -q -r backend -c pyproject.toml

  tests:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip check
      - name: Run tests with coverage gate
        run: >-
          pytest
          --cov=backend
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=68
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Container build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, tests]
    steps:
      - uses: actions/checkout@v6
      - name: Build image
        run: docker build --tag 00swift:ci .
      - name: Start container
        run: |
          docker run --detach --rm --name 00swift-ci \
            --publish 8765:8765 \
            --env SWIFT_ENV=sandbox \
            --env DB_URL=sqlite:////tmp/swift_dev.db \
            00swift:ci
      - name: Wait for readiness
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8765/ready >/dev/null; then
              curl --fail --silent http://127.0.0.1:8765/health
              exit 0
            fi
            sleep 1
          done
          docker logs 00swift-ci
          exit 1
      - name: Container logs
        if: always()
        run: docker logs 00swift-ci || true
