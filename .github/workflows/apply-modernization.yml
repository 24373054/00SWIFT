name: Apply modernization payload

on:
  push:
    branches: [feat/v2.1.0-hardening]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Restore audited source tree
        shell: bash
        run: |
          cat .modernization/payload.part-* | base64 --decode | tar -xJf -
          rm -rf .modernization .github/workflows/apply-modernization.yml
      - name: Commit restored tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: harden security, ledger, CI, and documentation"
          git push origin HEAD:feat/v2.1.0-hardening
