name: Release validation

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt
          python -m pip check
      - name: Verify version and quality gate
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(python -c 'from pathlib import Path; import re; print(re.search(r"version = \"([^\"]+)\"", Path("pyproject.toml").read_text()).group(1))')"
          test "$TAG_VERSION" = "$PACKAGE_VERSION"
          ruff check backend
          ruff format --check backend
          python -m compileall -q backend
          node --check frontend/app.js
          bandit -q -r backend -c pyproject.toml
          pytest --cov=backend --cov-report=term-missing --cov-fail-under=68
      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist
          git archive --format=tar.gz --prefix="00SWIFT-${VERSION}/" \
            --output="dist/00SWIFT-${VERSION}.tar.gz" HEAD
          python -m pip freeze > "dist/00SWIFT-${VERSION}-dependencies.txt"
          sha256sum dist/* > dist/SHA256SUMS
      - name: Upload release assets
        run: gh release upload "$RELEASE_TAG" dist/* --clobber
      - name: Record release validation success
        shell: bash
        run: |
          set -euo pipefail
          STATUS_PATH=".release/${RELEASE_TAG}.validated"
          STATUS_CONTENT="$(printf 'status=validated\ntag=%s\ncommit=%s\nworkflow_run=%s\n' \
            "$RELEASE_TAG" "${{ github.event.release.target_commitish }}" "${{ github.run_id }}" | base64 -w0)"
          gh api --method PUT "repos/${REPOSITORY}/contents/${STATUS_PATH}" \
            -f message="chore: record ${RELEASE_TAG} validation" \
            -f content="$STATUS_CONTENT" \
            -f branch=main >/dev/null
