name: V3 one-shot formatter

on:
  push:
    branches: [feat/v3-batch3-cbdc-pvp-release]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/v3-batch3-cbdc-pvp-release
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install -r backend/requirements-dev.txt
      - name: Apply canonical Ruff formatting
        run: |
          ruff format \
            backend/nextgen/cbdc.py \
            backend/nextgen/cbdc_router.py \
            backend/nextgen/platform.py
          ruff check backend
          ruff format --check backend
      - name: Commit canonical formatting and remove one-shot workflow
        run: |
          rm .github/workflows/v3-format-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply canonical Ruff formatting"
          git push origin HEAD:feat/v3-batch3-cbdc-pvp-release
