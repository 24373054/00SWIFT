name: Batch 3 integration repair

on:
  push:
    branches: [feat/v3-batch3-cbdc-pvp-release]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/v3-batch3-cbdc-pvp-release
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Mount routes and normalize time handling
        run: |
          python - <<'PY'
          from pathlib import Path

          main = Path("backend/main.py")
          text = main.read_text()
          text = text.replace(
              "from nextgen.router import router as nextgen_router\n",
              "from nextgen.cbdc_router import router as cbdc_router\nfrom nextgen.router import router as nextgen_router\n",
          )
          text = text.replace(
              "    nextgen_router,\n):",
              "    nextgen_router,\n    cbdc_router,\n):",
          )
          main.write_text(text)

          cbdc = Path("backend/nextgen/cbdc.py")
          text = cbdc.read_text()
          marker = '''def _json(value: Any) -> str:\n    return json.dumps(value, sort_keys=True, separators=(",", ":"), default=str)\n'''
          replacement = marker + '''\n\ndef _as_utc(value: dt.datetime) -> dt.datetime:\n    if value.tzinfo is None:\n        return value.replace(tzinfo=dt.UTC)\n    return value.astimezone(dt.UTC)\n'''
          text = text.replace(marker, replacement)
          text = text.replace("voucher.expires_at < utcnow()", "_as_utc(voucher.expires_at) < utcnow()")
          text = text.replace("quote.expires_at < utcnow()", "_as_utc(quote.expires_at) < utcnow()")
          text = text.replace(
              'return utcnow() <= dt.datetime.fromisoformat(conditions["expires_at"])',
              'return utcnow() <= _as_utc(dt.datetime.fromisoformat(conditions["expires_at"]))',
          )
          cbdc.write_text(text)
          PY
      - name: Normalize source and commit
        run: |
          python -m pip install -r backend/requirements-dev.txt
          ruff check --fix backend
          ruff format backend
          bandit -q -r backend -c pyproject.toml
          rm .github/workflows/batch3-autofix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: integrate and normalize batch 3"
          git push origin HEAD:feat/v3-batch3-cbdc-pvp-release
      - name: Run batch 3 regression tests
        run: pytest backend/tests/test_nextgen_batch3.py
