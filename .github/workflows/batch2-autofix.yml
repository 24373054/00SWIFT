name: Batch 2 deterministic repair

on:
  push:
    branches: [feat/v3-batch2-lifecycle-cips-ecny]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/v3-batch2-lifecycle-cips-ecny
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install -r backend/requirements-dev.txt
      - name: Format and validate batch
        run: |
          ruff check --fix backend
          ruff format backend
          bandit -q -r backend -c pyproject.toml
          pytest backend/tests/test_nextgen_batch2.py
      - name: Commit deterministic changes
        run: |
          rm .github/workflows/batch2-autofix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: normalize batch 2 implementation"
          git push origin HEAD:feat/v3-batch2-lifecycle-cips-ecny
