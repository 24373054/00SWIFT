name: NextGen formatting repair

on:
  push:
    branches: [feat/v3-batch1-standards-runtime]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feat/v3-batch1-standards-runtime
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install -r backend/requirements-dev.txt
      - name: Apply deterministic Ruff fixes
        run: |
          ruff check --fix backend
          ruff format backend
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "style: apply deterministic Ruff fixes"
          git push origin HEAD:feat/v3-batch1-standards-runtime
